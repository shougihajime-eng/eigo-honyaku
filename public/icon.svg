<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16121f"/>
      <stop offset="1" stop-color="#0a0a12"/>
    </linearGradient>
    <radialGradient id="glowViolet" cx="0.18" cy="0.1" r="0.95">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="0.92" cy="0.95" r="0.95">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.45"/>
      <stop offset="0.55" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="char" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ddd6fe"/>
    </linearGradient>
  </defs>

  <!-- ダーク基調の角丸正方形 -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#glowViolet)"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#glowCyan)"/>

  <!-- 紫→マゼンタ→シアンのアクセント枠 -->
  <rect x="14" y="14" width="484" height="484" rx="104" fill="none"
        stroke="url(#ring)" stroke-width="8" opacity="0.85"/>

  <!-- 漢字「訳」 -->
  <text x="256" y="350" text-anchor="middle"
        font-family="'Yu Mincho','Hiragino Mincho ProN','Noto Serif JP',serif"
        font-weight="700" font-size="290" fill="url(#char)">訳</text>
</svg>
